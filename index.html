<script>
let bloqueado = false;
let salidas = 0;

/* ====== BLOQUEO POR CAMBIO DE PESTAÑA ====== */
document.addEventListener("visibilitychange", () => {
  if (document.hidden && !bloqueado) {
    salidas++;
    bloquearExamen("cambio_ventana");
  }
});

/* ====== BLOQUEO POR TECLAS DE RECARGA ====== */
document.addEventListener("keydown", function (e) {
  // F5
  if (e.key === "F5") {
    e.preventDefault();
    bloquearExamen("recarga_f5");
  }

  // Ctrl + R / Cmd + R
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "r") {
    e.preventDefault();
    bloquearExamen("recarga_ctrl_r");
  }
});

/* ====== INTENTO DE RECARGA / CERRAR ====== */
window.addEventListener("beforeunload", function (e) {
  if (!bloqueado) {
    bloquearExamen("recarga_navegador");
    e.preventDefault();
    e.returnValue = "";
  }
});

/* ====== FUNCIÓN DE BLOQUEO ====== */
function bloquearExamen(motivo) {
  if (bloqueado) return;

  bloqueado = true;

  document.getElementById("examen").style.display = "none";
  document.getElementById("bloqueado").style.display = "block";

  enviarDatos("bloqueado", motivo);
}

/* ====== ENVÍO NORMAL ====== */
function enviar() {
  if (bloqueado) return;
  enviarDatos("terminado", "normal");
  alert("Examen enviado correctamente");
}

/* ====== ENVÍO A POWER AUTOMATE ====== */
function enviarDatos(estado, motivo) {
  fetch("PEGA_AQUI_TU_ENDPOINT_DE_POWER_AUTOMATE", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      nombre: document.getElementById("nombre").value || "Sin nombre",
      examen: "EHSS Contratistas",
      estado: estado,
      motivo: motivo,
      salidas: salidas,
      fecha: new Date().toISOString()
    })
  });
}
</script>
